<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lễ Tốt Nghiệp 2026 - FPT Polytechnic</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="particles-js"></div>

    <div class="login-container">
        <h1>🎓 <span id="typing-text"></span></h1>
        <p>Vui lòng xác nhận danh tính để nhận thiệp</p>
        
        <input type="text" id="guestName" placeholder="Tên của bạn là...">
        
        <select id="guestRole">
            <option value="">Bạn là sao với mình?</option>
            <option value="family">Gia đình yêu thương</option>
            <option value="friend">Cốt đột (Bạn bè)</option>
            <option value="lover">Nóc nhà (Embe Iu)</option>
            <option value="small_family">Gia đình nhỏ 💖</option>
        </select>

        <button onclick="saveGuestInfo()">Nhận Thiệp Ngay</button>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    
    <script src="js/main.js"></script>
</body>
</html>
